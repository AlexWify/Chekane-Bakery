<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чеканэ — Пекарня</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="navbar">
    <span class="logo" onclick="changePage('home')">🥐 Чеканэ</span>
    <div class="nav-links" id="navLinks"></div>
    <div class="user-info" id="userInfo"></div>
</div>

<div class="container" id="app">
    <div class="loading">Загрузка...</div>
</div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/cart.js"></script>

<script src="js/admin.js"></script>

<script src="js/profile.js"></script>
<script src="js/render.js"></script>
<script src="js/app.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
            const navLinks = document.getElementById('navLinks');
            if (navLinks && typeof currentUser !== 'undefined' && currentUser && currentUser.userId) {
                if (!navLinks.innerHTML.includes('profile')) {
                    navLinks.innerHTML += '<button class="nav-link" onclick="changePage(\'profile\')">👤 Профиль</button>';
                    console.log('✅ Кнопка профиля добавлена принудительно');
                }
            }
        }, 500);
    });
</script>

</body>
</html>
