services:
  backend:
    build: ./ChekaneCRM.Backend
    ports:
      - "5000:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Data Source=/app/data/chekane.db"
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
    volumes:
      - backend-data:/app/data

  frontend:
    build: ./ChekaneCRM.Frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  backend-data: